    <title>Varun Ragunathan — Staff Software Engineer</title>
    <!-- Prevent theme FOUC: set data-theme before React loads so CSS vars resolve immediately -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('theme-pref') || 'auto';
          var light = p === 'light' || (p === 'auto' && window.matchMedia('(prefers-color-scheme:light)').matches);
          if (light) document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
