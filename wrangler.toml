name = "varun-portfolio"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]
main = "worker/index.js"

# ── Public vars ───────────────────────────────────────────────────
# Safe to commit. Override locally via .dev.vars.
[vars]
ENABLE_AUTH = "true"
RP_ID = "varunr.dev"         # Change to your domain
ORIGIN = "https://varunr.dev" # Change to your domain

# ── Twilio WhatsApp Sandbox ───────────────────────────────────────
# From number only — not a secret. Replace with your own sandbox number.
TWILIO_WHATSAPP_FROM = "whatsapp:+14155238886"

# ── Required secrets (set once, never committed) ──────────────────
# Run these commands to configure secrets in Cloudflare:
#
#   wrangler secret put ADMIN_EMAIL          # email address for the admin account
#   wrangler secret put RESEND_API_KEY       # from resend.com — used for OTP emails
#   wrangler secret put TOTP_ENCRYPTION_KEY  # 32-byte hex key, generate with:
#                                            #   openssl rand -hex 32
#   wrangler secret put TWILIO_ACCOUNT_SID   # from console.twilio.com
#   wrangler secret put TWILIO_AUTH_TOKEN    # from console.twilio.com



[assets]
directory = "./dist"

# ── D1 (SQLite) ── permanent storage: users, passkey credentials
[[d1_databases]]
binding = "varun_portfolio_auth"
database_name = "varun-portfolio-auth"
database_id = "329e850c-713c-49fa-93bc-671ef8ced36d"

# ── KV ── ephemeral storage: OTP codes, WebAuthn challenges, sessions
[[kv_namespaces]]
binding = "AUTH_KV"
id = "050acce2056d4c2883fea6f6f3b32ee2"

# ── Vectorize ── vector store for RAG
[[vectorize]]
binding = "VECTORIZE"
index_name = "varun-portfolio-rag"

# ── Workers AI ── embeddings + optional local generation
[ai]
binding = "AI"

# ── Durable Objects ── WebSocket broker for number-match approval
[[durable_objects.bindings]]
name = "NUM_MATCH_DO"
class_name = "NumMatchDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NumMatchDO"]