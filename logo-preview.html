<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Outfit', sans-serif;
    padding: 40px 24px;
    min-height: 100vh;
  }
  h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #4b5563;
    margin-bottom: 12px;
  }
  .card {
    background: #111;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #4b5563;
    padding: 12px 20px 0;
  }
  /* Nav bar mock */
  .nav {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #1f1f1f;
    position: relative;
    padding: 0 24px;
  }
  /* Avatar stub */
  .avatar-stub {
    position: absolute;
    right: 24px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #6366f1;
    border: 2px solid #4338ca;
    opacity: 0.5;
  }

  /* ── Option 1: Split accent ── */
  .opt1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .opt1 .name { color: #e5e5e5; }
  .opt1 .tld  { color: #6366f1; font-weight: 500; }

  /* ── Option 2: Gradient ── */
  .opt2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, #e5e5e5 0%, #6366f1 55%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Option 3: Monogram badge ── */
  .opt3 {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .opt3-badge {
    width: 24px; height: 24px;
    border-radius: 7px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0;
    flex-shrink: 0;
  }
  .opt3-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    color: #e5e5e5;
  }
  .opt3-text .tld { color: #6366f1; }

  /* ── Option 4: Terminal style ── */
  .opt4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: default;
    user-select: none;
  }
  .opt4-prefix {
    color: #4b5563;
    display: inline-block;
    min-width: 20px;
    transition: color 0.1s;
    will-change: transform, opacity;
  }
  .opt4-name   { color: #e5e5e5; }
  .opt4-tld    { color: #6366f1; }

  /* ── Option 5: Glitch on hover ── */
  .opt5-wrap {
    position: relative;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    color: #e5e5e5;
    cursor: pointer;
    user-select: none;
  }
  .opt5-wrap::before,
  .opt5-wrap::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .opt5-wrap:hover::before {
    color: #6366f1;
    opacity: 0.7;
    animation: glitch-a 0.4s steps(2) infinite;
  }
  .opt5-wrap:hover::after {
    color: #ec4899;
    opacity: 0.5;
    animation: glitch-b 0.35s steps(2) infinite;
  }
  @keyframes glitch-a {
    0%   { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); }
    25%  { clip-path: inset(60% 0 10% 0); transform: translate(2px, 0); }
    50%  { clip-path: inset(40% 0 30% 0); transform: translate(-1px, 0); }
    75%  { clip-path: inset(10% 0 70% 0); transform: translate(1px, 0); }
    100% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); }
  }
  @keyframes glitch-b {
    0%   { clip-path: inset(50% 0 20% 0); transform: translate(2px, 1px); }
    33%  { clip-path: inset(10% 0 55% 0); transform: translate(-2px, -1px); }
    66%  { clip-path: inset(70% 0 5%  0); transform: translate(1px, 0); }
    100% { clip-path: inset(50% 0 20% 0); transform: translate(2px, 1px); }
  }

  /* ── Bonus: Gradient + split ── */
  .opt6 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: baseline;
  }
  .opt6-name {
    color: #e5e5e5;
    font-weight: 400;
  }
  .opt6-tld {
    background: linear-gradient(90deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 500;
  }

  .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(99,102,241,0.12);
    color: #6366f1;
    border: 1px solid rgba(99,102,241,0.25);
    margin-left: 8px;
    vertical-align: middle;
  }

  .spacer { height: 32px; }
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #374151;
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a1a;
  }
</style>
</head>
<body>

<h2>Logo options — hover option 5 for glitch effect</h2>
<div class="spacer"></div>

<!-- Option 1 -->
<div class="card">
  <div class="label">Option 1 — Split accent</div>
  <div class="nav">
    <span class="opt1">
      <span class="name">varunr</span><span class="tld">.dev</span>
    </span>
    <div class="avatar-stub"></div>
  </div>
</div>

<!-- Option 2 -->
<div class="card">
  <div class="label">Option 2 — Full gradient</div>
  <div class="nav">
    <span class="opt2">varunr.dev</span>
    <div class="avatar-stub"></div>
  </div>
</div>

<!-- Option 3 -->
<div class="card">
  <div class="label">Option 3 — Monogram badge</div>
  <div class="nav">
    <span class="opt3">
      <span class="opt3-badge">VR</span>
      <span class="opt3-text">varunr<span class="tld">.dev</span></span>
    </span>
    <div class="avatar-stub"></div>
  </div>
</div>

<!-- Option 4 -->
<div class="card">
  <div class="label">Option 4 — Terminal style <span class="tag">hover me</span></div>
  <div class="nav" id="opt4-nav">
    <span class="opt4" id="opt4-logo">
      <span class="opt4-prefix" id="opt4-prefix">~/</span><span class="opt4-name">varunr</span><span class="opt4-tld">.dev</span>
    </span>
    <div class="avatar-stub"></div>
  </div>
</div>

<!-- Option 5 -->
<div class="card">
  <div class="label">Option 5 — Glitch on hover <span class="tag">hover me</span></div>
  <div class="nav">
    <span class="opt5-wrap" data-text="varunr.dev">varunr.dev</span>
    <div class="avatar-stub"></div>
  </div>
</div>

<!-- Bonus -->
<div class="card">
  <div class="label">Bonus — Split + gradient .dev</div>
  <div class="nav">
    <span class="opt6">
      <span class="opt6-name">varunr</span><span class="opt6-tld">.dev</span>
    </span>
    <div class="avatar-stub"></div>
  </div>
</div>

<script>
// Symbols: mix of shell/code prefixes and math operators for elegance
const SYMBOLS = ['~/', './', '> ', '$ ', '# ', '=>', '::', '&&', '<>', '**', '//', 'λ ', '∑ ', '∇ ', '∂ ', 'φ ', 'π '];

// Golden ratio — used to derive per-symbol dwell time so the cycle
// feels non-mechanical. Each symbol stays for BASE_MS ms, but the
// easing is driven entirely by trigonometry.
const PHI          = 1.6180339887;
const BASE_MS      = 520;           // ms per symbol
const SETTLE_MS    = 340;           // ms to animate back to ~/ on leave

const prefixEl = document.getElementById('opt4-prefix');
const nav      = document.getElementById('opt4-nav');

let rafId      = null;
let startTime  = null;
let isHovering = false;
let leaveTime  = null;
let leaveFrom  = null;   // symbol displayed when mouse left
let leaveFromY = 0;

// Lerp between two hex colours via linear RGB
function lerpColor(hex1, hex2, t) {
  const parse = h => [
    parseInt(h.slice(1,3),16),
    parseInt(h.slice(3,5),16),
    parseInt(h.slice(5,7),16),
  ];
  const [r1,g1,b1] = parse(hex1);
  const [r2,g2,b2] = parse(hex2);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function applySymbol(symbol, opacity, y) {
  // Colour: lerp from dim (#4b5563) → accent (#6366f1) with sin envelope
  const color = lerpColor('#4b5563', '#6366f1', opacity);
  prefixEl.textContent      = symbol;
  prefixEl.style.opacity    = 0.35 + 0.65 * opacity;
  prefixEl.style.color      = color;
  prefixEl.style.transform  = `translateY(${y.toFixed(2)}px)`;
}

function tick(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;

  if (isHovering) {
    // ── Active cycling ────────────────────────────────────────────
    // Position in the cycle — scaled by PHI so dwell feels organic
    const cycleLen = BASE_MS * PHI;
    const pos      = (elapsed / cycleLen) % SYMBOLS.length;
    const idx      = Math.floor(pos) % SYMBOLS.length;
    const phase    = pos - Math.floor(pos);          // 0 → 1 within symbol

    // Opacity envelope: sin bell — smooth rise and fall, peaks at midpoint
    const env = Math.sin(phase * Math.PI);

    // Y offset: damped sine — rises from 0, peaks, returns to 0.
    // Using (1-phase) as the decay envelope so it always lands cleanly.
    const yAmp  = 5;
    const y     = (1 - phase) * Math.sin(phase * Math.PI * 2) * -yAmp;

    applySymbol(SYMBOLS[idx], env, y);
    rafId = requestAnimationFrame(tick);

  } else {
    // ── Settle back to ~/ ─────────────────────────────────────────
    // Ease with a critically-damped-like curve: 1 - e^(-k*t) shaped
    // but implemented as cos so it overshoots very slightly (natural feel).
    const t = Math.min((ts - leaveTime) / SETTLE_MS, 1);

    // Cosine ease: starts fast, decelerates. No overshoot, very clean.
    const ease   = 0.5 - 0.5 * Math.cos(t * Math.PI);
    const yEase  = leaveFromY * (1 - ease);         // converge y → 0

    if (t < 1) {
      applySymbol(leaveFrom, 1 - ease, yEase);
      rafId = requestAnimationFrame(tick);
    } else {
      // Settled — restore default state
      prefixEl.textContent     = '~/';
      prefixEl.style.opacity   = '1';
      prefixEl.style.color     = '#4b5563';
      prefixEl.style.transform = 'translateY(0px)';
      rafId = null;
    }
  }
}

nav.addEventListener('mouseenter', () => {
  isHovering = true;
  startTime  = null;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
});

nav.addEventListener('mouseleave', () => {
  isHovering = false;
  leaveTime  = performance.now();
  leaveFrom  = prefixEl.textContent;
  leaveFromY = parseFloat(prefixEl.style.transform.replace('translateY(','')) || 0;
  startTime  = null;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
});
</script>
</body>
</html>
