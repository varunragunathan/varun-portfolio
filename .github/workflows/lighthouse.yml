name: Lighthouse

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.LIGHTHOUSE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          lighthouse https://varunr.dev \
            --output=json \
            --output=html \
            --output-path=./lh-report \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --quiet

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: ./lh-report.report.html
          retention-days: 30

      - name: Publish report to GitHub Pages
        run: |
          # Stamp the report with the date and sha for the index page
          DATE=$(date -u +"%Y-%m-%d")
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHA_SHORT="${SHA:0:7}"

          # Clone gh-pages branch (or create it)
          git fetch origin gh-pages 2>/dev/null || true
          git worktree add gh-pages-dir gh-pages 2>/dev/null || (
            git worktree add --orphan gh-pages-dir && cd gh-pages-dir && git checkout --orphan gh-pages
          )

          # Copy report into a dated folder
          mkdir -p gh-pages-dir/lighthouse
          cp ./lh-report.report.html "gh-pages-dir/lighthouse/${DATE}-${SHA_SHORT}.html"

          # Regenerate the index listing
          node -e "
            const fs = require('fs');
            const dir = 'gh-pages-dir/lighthouse';
            // Sort using history.json deploy order (append-only, oldest first) so newest appears first
            const histPath = 'lighthouse/history.json';
            const history = fs.existsSync(histPath) ? JSON.parse(fs.readFileSync(histPath, 'utf8')) : [];
            const shaOrder = history.map(e => e.sha).reverse();
            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith('.html') && f !== 'index.html')
              .sort((a, b) => {
                const shaA = a.replace('.html', '').split('-').pop();
                const shaB = b.replace('.html', '').split('-').pop();
                const idxA = shaOrder.indexOf(shaA);
                const idxB = shaOrder.indexOf(shaB);
                if (idxA === -1 && idxB === -1) return b.localeCompare(a);
                if (idxA === -1) return 1;
                if (idxB === -1) return -1;
                return idxA - idxB;
              });
            const rows = files.map(f => {
              const name = f.replace('.html', '');
              const lastDash = name.lastIndexOf('-');
              const date = name.slice(0, lastDash);
              const sha = name.slice(lastDash + 1);
              return \`<tr><td><a href=\"\${f}\">\${date}</a></td><td><code>\${sha}</code></td></tr>\`;
            }).join('\n');
            const html = \`<!DOCTYPE html>
          <html lang=\"en\"><head><meta charset=\"UTF-8\">
          <title>Lighthouse Reports — varunr.dev</title>
          <style>body{font-family:monospace;max-width:600px;margin:40px auto;padding:0 20px}
          table{width:100%;border-collapse:collapse}td{padding:8px;border-bottom:1px solid #eee}
          a{color:#0a6b55}</style></head>
          <body><h2>Lighthouse Reports</h2>
          <table><tr><th>Date</th><th>SHA</th></tr>\${rows}</table></body></html>\`;
            fs.writeFileSync('gh-pages-dir/lighthouse/index.html', html);
          "

          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse/
          git diff --staged --quiet || git commit -m "lighthouse: ${DATE} ${SHA_SHORT}"
          git push origin gh-pages

      - name: Append score to history
        run: |
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('./lh-report.report.json', 'utf8'));
            const c = r.categories;
            const entry = {
              date: new Date().toISOString().split('T')[0],
              sha: '${{ github.event.workflow_run.head_sha }}'.slice(0, 7),
              performance:    Math.round(c.performance.score * 100),
              accessibility:  Math.round(c.accessibility.score * 100),
              bestPractices:  Math.round(c['best-practices'].score * 100),
              seo:            Math.round(c.seo.score * 100),
            };
            const path = 'lighthouse/history.json';
            const history = fs.existsSync(path)
              ? JSON.parse(fs.readFileSync(path, 'utf8'))
              : [];
            history.push(entry);
            fs.mkdirSync('lighthouse', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(history, null, 2));
            console.log('Scores recorded:', JSON.stringify(entry));
          "

      - name: Commit scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse/history.json
          git diff --staged --quiet || git commit -m "chore: lighthouse scores [skip ci]"
          git push
