name: Lighthouse

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.LIGHTHOUSE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          lighthouse https://varunr.dev \
            --output=json \
            --output=html \
            --output-path=./lh-report \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --quiet

      - name: Upload Lighthouse report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: |
            ./lh-report.report.html
            ./lh-report.report.json
          retention-days: 30

      - name: Append score to history
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          TIME=$(date -u +"%H:%M")
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHA_SHORT="${SHA:0:7}"
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('./lh-report.report.json', 'utf8'));
            const score = k => Math.round(r.categories[k].score * 100);
            const history = JSON.parse(fs.readFileSync('lighthouse/history.json', 'utf8'));
            history.push({
              date: '${DATE}',
              time: '${TIME}',
              sha:  '${SHA_SHORT}',
              performance:   score('performance'),
              accessibility: score('accessibility'),
              bestPractices: score('best-practices'),
              seo:           score('seo'),
            });
            fs.writeFileSync('lighthouse/history.json', JSON.stringify(history, null, 2) + '\n');
          "
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse/history.json
          git diff --staged --quiet || git commit -m "lighthouse: ${DATE} ${SHA_SHORT}"
          git push origin main

      - name: Publish report to GitHub Pages
        run: |
          # Stamp the report with datetime + sha so filenames sort chronologically
          DATETIME=$(date -u +"%Y-%m-%dT%H-%M")
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHA_SHORT="${SHA:0:7}"

          # Clone gh-pages branch (or create it)
          git fetch origin gh-pages 2>/dev/null || true
          git worktree add gh-pages-dir gh-pages 2>/dev/null || (
            git worktree add --orphan gh-pages-dir && cd gh-pages-dir && git checkout --orphan gh-pages
          )

          # Copy report into a dated folder
          mkdir -p gh-pages-dir/lighthouse
          cp ./lh-report.report.html "gh-pages-dir/lighthouse/${DATETIME}-${SHA_SHORT}.html"

          # Regenerate the index listing
          node -e "
            const fs = require('fs');
            const dir = 'gh-pages-dir/lighthouse';
            // YYYY-MM-DDTHH-MM prefix → lexicographic sort gives newest first
            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith('.html') && f !== 'index.html')
              .sort((a, b) => b.localeCompare(a));
            const rows = files.map(f => {
              const name = f.replace('.html', '');
              const lastDash = name.lastIndexOf('-');
              const sha = name.slice(lastDash + 1);
              const ts = name.slice(0, lastDash); // YYYY-MM-DDTHH-MM
              const [datePart, timePart] = ts.split('T');
              const time = timePart ? timePart.replace('-', ':') + ' UTC' : '';
              const label = time ? \`\${datePart} \${time}\` : datePart;
              return \`<tr><td><a href=\"\${f}\">\${label}</a></td><td><code>\${sha}</code></td></tr>\`;
            }).join('\n');
            const html = \`<!DOCTYPE html>
          <html lang=\"en\"><head><meta charset=\"UTF-8\">
          <title>Lighthouse Reports — varunr.dev</title>
          <style>body{font-family:monospace;max-width:640px;margin:40px auto;padding:0 20px}
          table{width:100%;border-collapse:collapse}td{padding:8px;border-bottom:1px solid #eee}
          a{color:#0a6b55}</style></head>
          <body><h2>Lighthouse Reports</h2>
          <table><tr><th>Run time (UTC)</th><th>SHA</th></tr>\${rows}</table></body></html>\`;
            fs.writeFileSync('gh-pages-dir/lighthouse/index.html', html);
          "

          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse/
          git diff --staged --quiet || git commit -m "lighthouse: ${DATETIME} ${SHA_SHORT}"
          git push origin gh-pages

